<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dream AI — Rüya Tabiri</title>
  <meta name="description" content="Rüyalarının sırrını çöz 🌙 AI destekli rüya yorumu uygulaması" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #07041a;
      font-family: 'Inter', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
    }

    #stars-canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .bg-glow {
      position: fixed;
      top: -20vh;
      left: 50%;
      transform: translateX(-50%);
      width: 700px;
      height: 700px;
      background: radial-gradient(circle, rgba(88, 28, 180, 0.35) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Dil toggle ── */
    .lang-toggle {
      position: fixed;
      top: 18px;
      right: 18px;
      z-index: 10;
      display: flex;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px;
      overflow: hidden;
    }
    .lang-btn {
      padding: 6px 14px;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.5px;
      color: rgba(200,180,255,0.5);
      cursor: pointer;
      border: none;
      background: transparent;
      transition: all 0.2s ease;
    }
    .lang-btn.active {
      background: rgba(212, 170, 50, 0.2);
      color: #d4aa32;
    }

    .card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      padding: 48px 28px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .logo-wrap {
      width: 88px;
      height: 88px;
      border-radius: 24px;
      background: linear-gradient(145deg, #3b1a7a, #1e0d40);
      border: 1.5px solid rgba(212, 170, 50, 0.4);
      box-shadow: 0 0 40px rgba(140, 80, 220, 0.5), 0 0 80px rgba(100, 40, 180, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 44px;
      margin-bottom: 20px;
      animation: float 4s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-8px); }
    }

    .app-name {
      font-family: 'Cinzel', serif;
      font-size: 22px;
      font-weight: 600;
      color: #d4aa32;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 8px;
      text-shadow: 0 0 20px rgba(212, 170, 50, 0.5);
    }

    .app-tagline {
      font-size: 13.5px;
      font-weight: 300;
      color: rgba(200, 170, 240, 0.75);
      letter-spacing: 0.5px;
      margin-bottom: 36px;
      text-align: center;
      line-height: 1.5;
    }

    .divider {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(212, 170, 50, 0.3), transparent);
    }
    .divider span {
      font-size: 11px;
      color: rgba(212, 170, 50, 0.5);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .link-btn {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 15px 20px;
      border-radius: 16px;
      text-decoration: none;
      border: 1px solid transparent;
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }
    .link-btn:hover { transform: translateY(-2px); }
    .link-btn:active { transform: scale(0.98); }

    .btn-store {
      background: linear-gradient(135deg, rgba(212, 170, 50, 0.12), rgba(180, 130, 20, 0.08));
      border-color: rgba(212, 170, 50, 0.35);
      box-shadow: 0 4px 24px rgba(212, 170, 50, 0.08);
    }
    .btn-store:hover {
      border-color: rgba(212, 170, 50, 0.7);
      box-shadow: 0 8px 32px rgba(212, 170, 50, 0.18);
    }

    .btn-social {
      background: rgba(255, 255, 255, 0.04);
      border-color: rgba(255, 255, 255, 0.08);
    }
    .btn-social:hover {
      background: rgba(255, 255, 255, 0.07);
      border-color: rgba(255, 255, 255, 0.18);
      box-shadow: 0 4px 20px rgba(100, 50, 200, 0.15);
    }

    .btn-icon {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }
    .btn-appstore .btn-icon  { background: rgba(0, 122, 255, 0.15); }
    .btn-playstore .btn-icon { background: rgba(52, 168, 83, 0.15); }
    .btn-tiktok .btn-icon    { background: rgba(255, 0, 80, 0.12); }
    .btn-instagram .btn-icon { background: rgba(225, 48, 108, 0.12); }
    .btn-youtube .btn-icon   { background: rgba(255, 0, 0, 0.12); }

    .btn-text { flex: 1; }
    .btn-label {
      display: block;
      font-size: 14.5px;
      font-weight: 500;
      color: #e8dff8;
      line-height: 1;
      margin-bottom: 3px;
    }
    .btn-sublabel {
      display: block;
      font-size: 11.5px;
      color: rgba(180, 155, 220, 0.55);
      font-weight: 300;
    }
    .btn-arrow {
      color: rgba(212, 170, 50, 0.4);
      font-size: 16px;
      transition: transform 0.18s ease, color 0.18s ease;
    }
    .link-btn:hover .btn-arrow {
      transform: translateX(3px);
      color: rgba(212, 170, 50, 0.8);
    }

    .section-label {
      width: 100%;
      font-size: 10px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: rgba(212, 170, 50, 0.45);
      margin-bottom: 4px;
      padding-left: 4px;
    }
    .gap-top { margin-top: 8px; }

    .footer {
      margin-top: 36px;
      font-size: 11px;
      color: rgba(140, 110, 190, 0.35);
      letter-spacing: 1px;
    }
  </style>
</head>
<body>

  <canvas id="stars-canvas"></canvas>
  <div class="bg-glow"></div>

  <!-- Dil Toggle -->
  <div class="lang-toggle">
    <button class="lang-btn active" onclick="setLang('tr')" id="btn-tr">TR</button>
    <button class="lang-btn" onclick="setLang('en')" id="btn-en">EN</button>
  </div>

  <div class="card">
    <div class="logo-wrap">🌙</div>
    <div class="app-name">Dream AI</div>
    <div class="app-tagline" id="tagline">Rüyalarının sırrını çöz — Bilinçaltın sana bir şey söylüyor</div>

    <div class="divider"><span id="divider-text">✦ İndir ✦</span></div>

    <div class="links">

      <a class="link-btn btn-store btn-appstore"
         href="https://apps.apple.com/tr/app/dream-ai-r%C3%BCya-tabiri/id6760260260?l=tr"
         target="_blank" rel="noopener">
        <div class="btn-icon">🍎</div>
        <div class="btn-text">
          <span class="btn-label">App Store</span>
          <span class="btn-sublabel" id="sub-appstore">iPhone & iPad için indir</span>
        </div>
        <span class="btn-arrow">›</span>
      </a>

      <a class="link-btn btn-store btn-playstore"
         href="https://play.google.com/store/apps/details?id=com.ruyatabircisi.ai"
         target="_blank" rel="noopener">
        <div class="btn-icon">▶</div>
        <div class="btn-text">
          <span class="btn-label">Google Play</span>
          <span class="btn-sublabel" id="sub-playstore">Android için indir</span>
        </div>
        <span class="btn-arrow">›</span>
      </a>

      <div class="section-label gap-top" id="follow-label">✦ Bizi takip et</div>

      <a class="link-btn btn-social btn-tiktok"
         href="https://www.tiktok.com/@dreamairuyatabiri"
         target="_blank" rel="noopener">
        <div class="btn-icon">🎵</div>
        <div class="btn-text">
          <span class="btn-label">TikTok</span>
          <span class="btn-sublabel">@dreamairuyatabiri</span>
        </div>
        <span class="btn-arrow">›</span>
      </a>

      <a class="link-btn btn-social btn-instagram"
         href="https://www.instagram.com/ruyatabiriai"
         target="_blank" rel="noopener">
        <div class="btn-icon">📸</div>
        <div class="btn-text">
          <span class="btn-label">Instagram</span>
          <span class="btn-sublabel">@ruyatabiriai</span>
        </div>
        <span class="btn-arrow">›</span>
      </a>

      <a class="link-btn btn-social btn-youtube"
         href="https://youtube.com/@dreamairuya"
         target="_blank" rel="noopener">
        <div class="btn-icon">▶️</div>
        <div class="btn-text">
          <span class="btn-label">YouTube</span>
          <span class="btn-sublabel">@dreamairuya</span>
        </div>
        <span class="btn-arrow">›</span>
      </a>

    </div>

    <div class="footer">✦ dreamai.app ✦</div>
  </div>

  <script>
    const strings = {
      tr: {
        tagline:      "Rüyalarının sırrını çöz — Bilinçaltın sana bir şey söylüyor",
        divider:      "✦ İndir ✦",
        subAppstore:  "iPhone & iPad için indir",
        subPlaystore: "Android için indir",
        followLabel:  "✦ Bizi takip et",
      },
      en: {
        tagline:      "Unlock the secrets of your dreams — Your subconscious is speaking",
        divider:      "✦ Download ✦",
        subAppstore:  "Download for iPhone & iPad",
        subPlaystore: "Download for Android",
        followLabel:  "✦ Follow us",
      }
    };

    function setLang(lang) {
      const s = strings[lang];
      document.getElementById('tagline').textContent       = s.tagline;
      document.getElementById('divider-text').textContent  = s.divider;
      document.getElementById('sub-appstore').textContent  = s.subAppstore;
      document.getElementById('sub-playstore').textContent = s.subPlaystore;
      document.getElementById('follow-label').textContent  = s.followLabel;
      document.getElementById('btn-tr').classList.toggle('active', lang === 'tr');
      document.getElementById('btn-en').classList.toggle('active', lang === 'en');
      document.documentElement.lang = lang;

      // App Store linkini dile göre değiştir
      const appStoreLink = document.querySelector('.btn-appstore');
      appStoreLink.href = lang === 'en'
        ? 'https://apps.apple.com/app/dream-ai-r%C3%BCya-tabiri/id6760260260'
        : 'https://apps.apple.com/tr/app/dream-ai-r%C3%BCya-tabiri/id6760260260?l=tr';
    }

    // Tarayıcı diline göre otomatik seç
    const browserLang = navigator.language?.startsWith('tr') ? 'tr' : 'en';
    setLang(browserLang);

    // ── Yıldız animasyonu ──
    const canvas = document.getElementById('stars-canvas');
    const ctx = canvas.getContext('2d');
    let stars = [];

    function resize() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    function initStars() {
      stars = [];
      for (let i = 0; i < 160; i++) {
        stars.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          r: Math.random() * 1.4 + 0.3,
          alpha: Math.random() * 0.7 + 0.1,
          speed: Math.random() * 0.004 + 0.002,
          phase: Math.random() * Math.PI * 2,
          gold: Math.random() < 0.15
        });
      }
    }

    function drawStars(t) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      stars.forEach(s => {
        const a = s.alpha * (0.6 + 0.4 * Math.sin(t * s.speed * 1000 + s.phase));
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fillStyle = s.gold
          ? `rgba(212, 170, 50, ${a})`
          : `rgba(200, 180, 255, ${a})`;
        ctx.fill();
      });
    }

    resize();
    initStars();
    requestAnimationFrame(function animate(t) {
      drawStars(t / 1000);
      requestAnimationFrame(animate);
    });
    window.addEventListener('resize', () => { resize(); initStars(); });
  </script>
</body>
</html>
