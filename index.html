<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dream AI — Rüya Tabiri</title>
  <meta name="description" content="Rüyalarının sırrını çöz 🌙 AI destekli rüya yorumu uygulaması" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: #07041a;
      font-family: 'Inter', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
    }
    #stars-canvas {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 0;
    }
    .bg-glow {
      position: fixed; top: -20vh; left: 50%;
      transform: translateX(-50%);
      width: 700px; height: 700px;
      background: radial-gradient(circle, rgba(88,28,180,0.35) 0%, transparent 70%);
      pointer-events: none; z-index: 0;
    }
    .lang-toggle {
      position: fixed; top: 18px; right: 18px; z-index: 10;
      display: flex;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px; overflow: hidden;
    }
    .lang-btn {
      padding: 6px 14px; font-size: 12px; font-weight: 500;
      letter-spacing: 0.5px; color: rgba(200,180,255,0.5);
      cursor: pointer; border: none; background: transparent;
      transition: all 0.2s ease;
    }
    .lang-btn.active { background: rgba(212,170,50,0.2); color: #d4aa32; }
    .card {
      position: relative; z-index: 1; width: 100%; max-width: 420px;
      padding: 48px 28px 40px;
      display: flex; flex-direction: column; align-items: center;
    }
    .logo-wrap {
      width: 88px; height: 88px; border-radius: 24px;
      background: linear-gradient(145deg, #3b1a7a, #1e0d40);
      border: 1.5px solid rgba(212,170,50,0.4);
      box-shadow: 0 0 40px rgba(140,80,220,0.5), 0 0 80px rgba(100,40,180,0.2);
      display: flex; align-items: center; justify-content: center;
      font-size: 44px; margin-bottom: 20px;
      animation: float 4s ease-in-out infinite;
    }
    @keyframes float {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-8px); }
    }
    .app-name {
      font-family: 'Cinzel', serif; font-size: 22px; font-weight: 600;
      color: #d4aa32; letter-spacing: 3px; text-transform: uppercase;
      margin-bottom: 8px; text-shadow: 0 0 20px rgba(212,170,50,0.5);
    }
    .app-tagline {
      font-size: 13.5px; font-weight: 300; color: rgba(200,170,240,0.75);
      letter-spacing: 0.5px; margin-bottom: 36px;
      text-align: center; line-height: 1.5;
    }
    .divider {
      width: 100%; display: flex; align-items: center;
      gap: 10px; margin-bottom: 28px;
    }
    .divider::before,.divider::after {
      content:''; flex:1; height:1px;
      background: linear-gradient(90deg,transparent,rgba(212,170,50,0.3),transparent);
    }
    .divider span { font-size:11px; color:rgba(212,170,50,0.5); letter-spacing:2px; text-transform:uppercase; }
    .links { width:100%; display:flex; flex-direction:column; gap:12px; }
    .link-btn {
      width:100%; display:flex; align-items:center; gap:14px;
      padding:15px 20px; border-radius:16px; text-decoration:none;
      border:1px solid transparent;
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
      cursor:pointer;
    }
    .link-btn:hover { transform:translateY(-2px); }
    .link-btn:active { transform:scale(0.98); }
    .btn-store {
      background: linear-gradient(135deg,rgba(212,170,50,0.12),rgba(180,130,20,0.08));
      border-color: rgba(212,170,50,0.35);
      box-shadow: 0 4px 24px rgba(212,170,50,0.08);
    }
    .btn-store:hover { border-color:rgba(212,170,50,0.7); box-shadow:0 8px 32px rgba(212,170,50,0.18); }
    .btn-social { background:rgba(255,255,255,0.04); border-color:rgba(255,255,255,0.08); }
    .btn-social:hover { background:rgba(255,255,255,0.07); border-color:rgba(255,255,255,0.18); box-shadow:0 4px 20px rgba(100,50,200,0.15); }
    .btn-icon {
      width:40px; height:40px; border-radius:12px;
      display:flex; align-items:center; justify-content:center;
      flex-shrink:0; overflow:hidden;
    }
    .btn-icon svg, .btn-icon img { width:22px; height:22px; }
    .btn-appstore  .btn-icon { background:rgba(0,122,255,0.15); }
    .btn-playstore .btn-icon { background:rgba(52,168,83,0.15); }
    .btn-tiktok    .btn-icon { background:rgba(0,0,0,0.3); }
    .btn-instagram .btn-icon { background:rgba(225,48,108,0.15); }
    .btn-youtube   .btn-icon { background:rgba(255,0,0,0.15); }
    .btn-text { flex:1; }
    .btn-label { display:block; font-size:14.5px; font-weight:500; color:#e8dff8; line-height:1; margin-bottom:3px; }
    .btn-sublabel { display:block; font-size:11.5px; color:rgba(180,155,220,0.55); font-weight:300; }
    .btn-arrow { color:rgba(212,170,50,0.4); font-size:16px; transition:transform 0.18s ease,color 0.18s ease; }
    .link-btn:hover .btn-arrow { transform:translateX(3px); color:rgba(212,170,50,0.8); }
    .section-label {
      width:100%; font-size:10px; letter-spacing:2.5px; text-transform:uppercase;
      color:rgba(212,170,50,0.45); margin-bottom:4px; padding-left:4px;
    }
    .gap-top { margin-top:8px; }
    .footer { margin-top:36px; font-size:11px; color:rgba(140,110,190,0.35); letter-spacing:1px; }
  </style>
</head>
<body>
  <canvas id="stars-canvas"></canvas>
  <div class="bg-glow"></div>

  <div class="lang-toggle">
    <button class="lang-btn active" onclick="setLang('tr')" id="btn-tr">TR</button>
    <button class="lang-btn" onclick="setLang('en')" id="btn-en">EN</button>
  </div>

  <div class="card">
    <div class="logo-wrap">🌙</div>
    <div class="app-name">Dream AI</div>
    <div class="app-tagline" id="tagline">Rüyalarının sırrını çöz — Bilinçaltın sana bir şey söylüyor</div>
    <div class="divider"><span id="divider-text">✦ İndir ✦</span></div>

    <div class="links">

      <!-- App Store -->
      <a class="link-btn btn-store btn-appstore"
         href="https://apps.apple.com/tr/app/dream-ai-r%C3%BCya-tabiri/id6760260260?l=tr"
         target="_blank" rel="noopener">
        <div class="btn-icon">
          <!-- Apple logo -->
          <svg viewBox="0 0 814 1000" fill="white" xmlns="http://www.w3.org/2000/svg">
            <path d="M788.1 340.9c-5.8 4.5-108.2 62.2-108.2 190.5 0 148.4 130.3 200.9 134.2 202.2-.6 3.2-20.7 71.9-68.7 141.9-42.8 61.6-87.5 123.1-155.5 123.1s-85.5-39.5-164-39.5c-76 0-103.7 40.8-165.9 40.8s-105-57.8-155.5-127.4C46 790.8 0 663 0 541.8c0-207 135.4-316.3 269-316.3 70.7 0 129.5 46.4 173.1 46.4 42.8 0 109.6-49.1 192.5-49.1 31 0 108.2 2.6 168.5 80.1zm-234-181.5c31.1-36.9 53.1-88.1 53.1-139.3 0-7.1-.6-14.3-1.9-20.1-50.6 1.9-110.8 33.7-147.1 75.8-28.5 32.4-55.1 83.6-55.1 135.5 0 7.8 1.3 15.6 1.9 18.1 3.2.6 8.4 1.3 13.6 1.3 45.4 0 102.5-30.4 135.5-71.3z"/>
          </svg>
        </div>
        <div class="btn-text">
          <span class="btn-label">App Store</span>
          <span class="btn-sublabel" id="sub-appstore">iPhone & iPad için indir</span>
        </div>
        <span class="btn-arrow">›</span>
      </a>

      <!-- Google Play -->
      <a class="link-btn btn-store btn-playstore"
         href="https://play.google.com/store/apps/details?id=com.ruyatabircisi.ai"
         target="_blank" rel="noopener">
        <div class="btn-icon">
          <!-- Google Play logo -->
          <svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
            <path d="M325.3 234.3L104.6 13l280.8 161.2-60.1 60.1zM47 0C34 6.8 25.3 19.2 25.3 35.3v441.3c0 16.1 8.7 28.5 21.7 35.3l232.6-233L47 0zm440 218.3l-47.6-27.4-63.6 63.6 63.6 63.6 47.6-27.4c13.6-7.8 22.3-22.1 22.3-36.4-.1-14.3-8.8-28.6-22.3-36.4zM104.6 499l280.8-161.2-60.1-60.1L104.6 499z" fill="white"/>
            <path d="M325.3 234.3L104.6 13l280.8 161.2-60.1 60.1z" fill="#EA4335"/>
            <path d="M47 0C34 6.8 25.3 19.2 25.3 35.3v441.3c0 16.1 8.7 28.5 21.7 35.3l232.6-233L47 0z" fill="#4285F4"/>
            <path d="M487 254.7l-47.6-27.4-63.6 63.6 63.6 63.6 47.6-27.4c13.6-7.8 22.3-22.1 22.3-36.4-.1-14.3-8.8-28.6-22.3-36z" fill="#FBBC05"/>
            <path d="M104.6 499l280.8-161.2-60.1-60.1L104.6 499z" fill="#34A853"/>
          </svg>
        </div>
        <div class="btn-text">
          <span class="btn-label">Google Play</span>
          <span class="btn-sublabel" id="sub-playstore">Android için indir</span>
        </div>
        <span class="btn-arrow">›</span>
      </a>

      <div class="section-label gap-top" id="follow-label">✦ Bizi takip et</div>

      <!-- TikTok -->
      <a class="link-btn btn-social btn-tiktok"
         href="https://www.tiktok.com/@dreamairuyatabiri"
         target="_blank" rel="noopener">
        <div class="btn-icon">
          <svg viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg">
            <path d="M19.59 6.69a4.83 4.83 0 01-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 01-2.88 2.5 2.89 2.89 0 01-2.89-2.89 2.89 2.89 0 012.89-2.89c.28 0 .54.04.79.1V9.01a6.33 6.33 0 00-.79-.05 6.34 6.34 0 00-6.34 6.34 6.34 6.34 0 006.34 6.34 6.34 6.34 0 006.33-6.34V8.69a8.18 8.18 0 004.79 1.54V6.79a4.85 4.85 0 01-1.02-.1z"/>
          </svg>
        </div>
        <div class="btn-text">
          <span class="btn-label">TikTok</span>
          <span class="btn-sublabel">@dreamairuyatabiri</span>
        </div>
        <span class="btn-arrow">›</span>
      </a>

      <!-- Instagram -->
      <a class="link-btn btn-social btn-instagram"
         href="https://www.instagram.com/ruyatabiriai"
         target="_blank" rel="noopener">
        <div class="btn-icon">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="ig-grad" x1="0%" y1="100%" x2="100%" y2="0%">
                <stop offset="0%" style="stop-color:#f09433"/>
                <stop offset="25%" style="stop-color:#e6683c"/>
                <stop offset="50%" style="stop-color:#dc2743"/>
                <stop offset="75%" style="stop-color:#cc2366"/>
                <stop offset="100%" style="stop-color:#bc1888"/>
              </linearGradient>
            </defs>
            <path fill="url(#ig-grad)" d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/>
          </svg>
        </div>
        <div class="btn-text">
          <span class="btn-label">Instagram</span>
          <span class="btn-sublabel">@ruyatabiriai</span>
        </div>
        <span class="btn-arrow">›</span>
      </a>

      <!-- YouTube -->
      <a class="link-btn btn-social btn-youtube"
         href="https://youtube.com/@dreamairuya"
         target="_blank" rel="noopener">
        <div class="btn-icon">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M23.498 6.186a3.016 3.016 0 00-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 00.502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 002.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 002.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z" fill="#FF0000"/>
          </svg>
        </div>
        <div class="btn-text">
          <span class="btn-label">YouTube</span>
          <span class="btn-sublabel">@dreamairuya</span>
        </div>
        <span class="btn-arrow">›</span>
      </a>

    </div>
    <div class="footer">✦ dreamai.app ✦</div>
  </div>

  <script>
    const strings = {
      tr: {
        tagline:      "Rüyalarının sırrını çöz — Bilinçaltın sana bir şey söylüyor",
        divider:      "✦ İndir ✦",
        subAppstore:  "iPhone & iPad için indir",
        subPlaystore: "Android için indir",
        followLabel:  "✦ Bizi takip et",
      },
      en: {
        tagline:      "Unlock the secrets of your dreams — Your subconscious is speaking",
        divider:      "✦ Download ✦",
        subAppstore:  "Download for iPhone & iPad",
        subPlaystore: "Download for Android",
        followLabel:  "✦ Follow us",
      }
    };
    function setLang(lang) {
      const s = strings[lang];
      document.getElementById('tagline').textContent       = s.tagline;
      document.getElementById('divider-text').textContent  = s.divider;
      document.getElementById('sub-appstore').textContent  = s.subAppstore;
      document.getElementById('sub-playstore').textContent = s.subPlaystore;
      document.getElementById('follow-label').textContent  = s.followLabel;
      document.getElementById('btn-tr').classList.toggle('active', lang === 'tr');
      document.getElementById('btn-en').classList.toggle('active', lang === 'en');
      document.documentElement.lang = lang;
      const appStoreLink = document.querySelector('.btn-appstore');
      appStoreLink.href = lang === 'en'
        ? 'https://apps.apple.com/app/dream-ai-r%C3%BCya-tabiri/id6760260260'
        : 'https://apps.apple.com/tr/app/dream-ai-r%C3%BCya-tabiri/id6760260260?l=tr';
    }
    const browserLang = navigator.language?.startsWith('tr') ? 'tr' : 'en';
    setLang(browserLang);

    // Yıldız animasyonu
    const canvas = document.getElementById('stars-canvas');
    const ctx = canvas.getContext('2d');
    let stars = [];
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    function initStars() {
      stars = [];
      for (let i = 0; i < 160; i++) {
        stars.push({
          x: Math.random()*canvas.width, y: Math.random()*canvas.height,
          r: Math.random()*1.4+0.3, alpha: Math.random()*0.7+0.1,
          speed: Math.random()*0.004+0.002, phase: Math.random()*Math.PI*2,
          gold: Math.random()<0.15
        });
      }
    }
    function drawStars(t) {
      ctx.clearRect(0,0,canvas.width,canvas.height);
      stars.forEach(s => {
        const a = s.alpha*(0.6+0.4*Math.sin(t*s.speed*1000+s.phase));
        ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
        ctx.fillStyle = s.gold ? `rgba(212,170,50,${a})` : `rgba(200,180,255,${a})`;
        ctx.fill();
      });
    }
    resize(); initStars();
    requestAnimationFrame(function animate(t) { drawStars(t/1000); requestAnimationFrame(animate); });
    window.addEventListener('resize', () => { resize(); initStars(); });
  </script>
</body>
</html>
